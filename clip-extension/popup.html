<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #262624;
      color: #e5e5e5;
      padding: 16px;
    }
    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #D4A04A;
      margin-bottom: 14px;
      letter-spacing: 0.03em;
    }
    label {
      display: block;
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    input, textarea {
      width: 100%;
      background: #2a2a28;
      border: 1px solid #353533;
      border-radius: 4px;
      color: #e5e5e5;
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus, textarea:focus {
      border-color: #D4A04A;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .source-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .source-row img {
      width: 16px;
      height: 16px;
      border-radius: 2px;
    }
    .source-row span {
      font-size: 12px;
      color: #a0a0a0;
    }
    button {
      width: 100%;
      background: #D4A04A;
      color: #1e1e1c;
      border: none;
      border-radius: 4px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #e0b05a; }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .shortcut {
      font-size: 10px;
      color: #666;
      text-align: center;
      margin-top: 8px;
    }
    .status {
      font-size: 12px;
      text-align: center;
      margin-top: 8px;
      min-height: 16px;
    }
    .status.success { color: #5CF49A; }
    .status.error { color: #F45C5C; }
  </style>
</head>
<body>
  <h1>SYNTROPIC CLIP</h1>
  <div class="source-row">
    <img id="favicon" src="" alt="">
    <span id="source-name">Loading...</span>
  </div>
  <label for="title">Title</label>
  <input type="text" id="title" placeholder="Article title">
  <label for="annotation">Your take</label>
  <textarea id="annotation" placeholder="Why this matters..."></textarea>
  <label for="tags">Tags (comma-separated)</label>
  <input type="text" id="tags" placeholder="ai, supply-chain, research">
  <button id="clip-btn">Clip</button>
  <div class="shortcut">&#8984;+Enter to clip</div>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
